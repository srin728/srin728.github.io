<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Rin's Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="blog.css">

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
      },
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- JS -->
  <script src="blog.js" defer></script>
</head>

<body>
  <div class="container">

    <!-- サイドバー -->
    <aside class="sidebar">
      <h2>タグ</h2>
      <ul id="tagList"></ul>

      <h2>記事一覧</h2>
      <ul id="articleList"></ul>

      <footer>
        <a href="index.html" class="no-underline">← ホームへ戻る</a>
      </footer>
    </aside>

    <!-- メイン -->
    <main class="content">
      <div id="articleContent">
        <p>記事を選択してください。</p>
      </div>
    </main>

  </div>
</body>

</html>
